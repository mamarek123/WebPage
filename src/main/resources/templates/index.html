<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Blog Osobisty</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">MojaStrona</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Blog</a></li>
                <li class="nav-item"><a class="nav-link" href="/vlogi">Vlogi</a></li>
                <li class="nav-item"><a class="nav-link" href="/przepisy">Przepisy</a></li>
                <li class="nav-item"><a class="nav-link" href="/filmy">Filmy</a></li>
                <li class="nav-item"><a class="nav-link" href="/sklep">Sklep</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<header class="py-5 bg-light text-center">
    <div class="container">
        <h1 class="display-4">Witaj na moim blogu!</h1>
        <p class="lead">Pasje, jedzenie i przemyślenia.</p>
    </div>
</header>

<!-- Main Content Area -->
<main class="flex-grow-1 p-3">
    <div class="row">
        <!-- Blog Posts Column -->
        <div class="col-lg-8">
            <!-- Example of a single post item: This loop will become *ngFor in Angular -->
            <div class="card mb-4" th:each="post : ${posts}">
                <div class="card-body">
                    <h2 class="card-title" th:text="${post.title}">Tytuł posta</h2>
                    <p class="card-text" th:text="${post.summary}">Krótki opis posta...</p>
                    <a href="#" class="btn btn-primary">Czytaj dalej &rarr;</a>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="col-lg-4">
            <div class="card p-3">
                <h4>O mnie</h4>
                <p>Krótki opis autora...</p>
            </div>
        </aside>
    </div>
</main>

<!-- Footer -->
<footer class="bg-dark text-white p-3 text-center">
    <div class="container">
        <p>&copy; 2026 Mój Blog. Wszystkie prawa zastrzeżone.</p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
